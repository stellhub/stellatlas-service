name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: stellatlas-service
  CONFIG_PATH: cmd/application.yml

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            package: stellatlas-service-linux-amd64
          - goos: linux
            goarch: arm64
            package: stellatlas-service-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build package
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          PACKAGE_NAME: ${{ matrix.package }}
        run: |
          set -euo pipefail
          mkdir -p "dist/${PACKAGE_NAME}"
          go build -trimpath -ldflags="-s -w" -o "dist/${PACKAGE_NAME}/${APP_NAME}" ./cmd
          chmod +x "dist/${PACKAGE_NAME}/${APP_NAME}"
          cp "${CONFIG_PATH}" "dist/${PACKAGE_NAME}/application.yaml"
          (cd "dist/${PACKAGE_NAME}" && zip -9 "../${PACKAGE_NAME}.zip" "${APP_NAME}" "application.yaml")

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: dist/${{ matrix.package }}.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
